name: Build Windows

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: curl --create-dirs -v --fail -L "https://aamrp.iamgabriel.dev/binaries/ffmpeg-x86_64-pc-windows-msvc.exe" -o "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
      - run: bun tauri build
      - uses: actions/upload-artifact@v7
        with:
          path: src-tauri/target/release/bundle/*
