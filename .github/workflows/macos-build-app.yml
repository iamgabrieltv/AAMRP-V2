name: Build macOS .app

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # - run: curl --create-dirs -v --fail -L "https://aamrp.iamgabriel.dev/binaries/ffmpeg-aarch64-apple-darwin" -o "src-tauri/binaries/ffmpeg-aarch64-apple-darwin"
      - uses: keithweaver/aws-s3-github-action@v1
        with:
          command: cp
          source: s3://4cab3932046a09b0ff01639eac5ba03d.r2.cloudflarestorage.com/binaries/ffmpeg-aarch64-apple-darwin
          destination: ./src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: auto
      - run: bun tauri build --bundles app
      - uses: actions/upload-artifact@v7
        with:
          path: src-tauri/target/release/bundle/*
