name: Build macOS .app

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # - run: curl --create-dirs -v --fail -L "https://aamrp.iamgabriel.dev/binaries/ffmpeg-aarch64-apple-darwin" -o "src-tauri/binaries/ffmpeg-aarch64-apple-darwin"
      - name: Download ffmpeg
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bun install -g wrangler@latest
          wrangler r2 object get --remote aamrp/binaries/ffmpeg-aarch64-apple-darwin --file ./src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x ./src-tauri/binaries/ffmpeg-aarch64-apple-darwin
      - run: bun tauri build --bundles app
      - uses: actions/upload-artifact@v7
        with:
          path: src-tauri/target/release/bundle/*
